<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Steam account received - ALTARA</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top left, rgba(56, 189, 248, .18), transparent 34%), #0f172a;
    }
    main {
      width: min(640px, 100%);
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 10px;
      background: rgba(15, 23, 42, .94);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .45);
      padding: 26px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 14px;
      color: #cbd5e1;
      line-height: 1.5;
    }
    code {
      display: block;
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(15, 23, 42, .82);
      border: 1px solid rgba(148, 163, 184, .22);
      color: #bfdbfe;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <h1 id="steamCallbackTitle">Steam account received</h1>
    <p id="steamCallbackMessage">Reading Steam OpenID response...</p>
    <code id="steamCallbackSteamId" hidden></code>
  </main>
  <script>
    (function () {
      function getAllParams() {
        const params = new URLSearchParams(window.location.search || "");
        const hash = String(window.location.hash || "");
        if (hash.startsWith("#?")) {
          const hashParams = new URLSearchParams(hash.slice(2));
          hashParams.forEach(function (value, key) {
            if (!params.has(key)) params.set(key, value);
          });
        }
        return params;
      }

      const params = getAllParams();
      const claimedId = String(params.get("openid.claimed_id") || "").trim();
      const mode = String(params.get("openid.mode") || "").trim().toLowerCase();
      const match = claimedId.match(/^https?:\/\/steamcommunity\.com\/openid\/id\/(\d{12,24})$/i);
      const steamid64 = match ? match[1] : "";
      const title = document.getElementById("steamCallbackTitle");
      const message = document.getElementById("steamCallbackMessage");
      const steamIdEl = document.getElementById("steamCallbackSteamId");

      if (steamid64) {
        title.textContent = "Steam account received";
        message.textContent = "ALTARA received a Steam OpenID claimed_id. Backend verification and saving will be wired next.";
        steamIdEl.hidden = false;
        steamIdEl.textContent = "SteamID64: " + steamid64;
        console.log("[SteamConnect] callback SteamID64 received", { steamid64: steamid64, claimedId: claimedId });
      } else if (mode === "cancel") {
        title.textContent = "Steam login cancelled";
        message.textContent = "Steam returned without a claimed_id.";
        console.warn("[SteamConnect] Steam login cancelled");
      } else {
        title.textContent = "Steam account not received";
        message.textContent = "Steam did not include a valid openid.claimed_id in this callback.";
        console.warn("[SteamConnect] missing or invalid openid.claimed_id", { claimedId: claimedId });
      }

      const payload = {
        type: steamid64 ? "altara:steam-openid-callback" : "altara:steam-openid-error",
        provider: "steam",
        steamid64: steamid64,
        claimedId: claimedId,
        mode: mode,
        href: window.location.href
      };
      try {
        if (window.opener && !window.opener.closed) window.opener.postMessage(payload, "*");
      } catch (_) {}
      try {
        window.parent && window.parent !== window && window.parent.postMessage(payload, "*");
      } catch (_) {}
    })();
  </script>
</body>
</html>
